version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: fincore-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: fincore
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: fincore123
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d fincore"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - fincore-network

  # FinCore Application (API + UI)
  fincore-app:
    build:
      context: ./app
      dockerfile: Dockerfile
      args:
        NODE_ENV: production
    container_name: fincore-app
    restart: unless-stopped
    ports:
      - "3000:3000"  # React UI
      - "4000:4000"  # Express API
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database Configuration
      DATABASE_URL: postgresql://admin:fincore123@postgres:5432/fincore
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: fincore
      DB_USER: admin
      DB_PASSWORD: fincore123
      
      # JWT Configuration
      JWT_SECRET: fincore_jwt_secret_2024
      JWT_EXPIRES_IN: 24h
      
      # Server Configuration
      NODE_ENV: production
      API_PORT: 4000
      UI_PORT: 3000
      
      # CORS
      CORS_ORIGIN: http://localhost:3000
    volumes:
      - ./pipeline:/app/pipeline:ro
      - ./data:/app/data:ro
      - pipeline_logs:/app/pipeline/logs
    networks:
      - fincore-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Jenkins CI/CD
  jenkins:
    image: jenkins/jenkins:lts-jdk17
    container_name: fincore-jenkins
    restart: unless-stopped
    ports:
      - "8080:8080"  # Jenkins UI
      - "50000:50000"  # Jenkins agent
    environment:
      JAVA_OPTS: "-Djenkins.install.runSetupWizard=false"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./tests:/tests:ro
    depends_on:
      - fincore-app
    networks:
      - fincore-network
    user: root

volumes:
  postgres_data:
    driver: local
  jenkins_home:
    driver: local
  pipeline_logs:
    driver: local

networks:
  fincore-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
